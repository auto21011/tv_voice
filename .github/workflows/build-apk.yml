name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34

      - name: Download Vosk Model
        run: |
          mkdir -p app/src/main/assets
          if [[ ! -d "app/src/main/assets/vosk-model-small-cn" ]]; then
            curl -L -o vosk-model.zip "https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip"
            unzip -o vosk-model.zip -d app/src/main/assets/
            rm -f vosk-model.zip
            MODEL_DIR=$(ls -d app/src/main/assets/vosk-model-small-cn*/)
            if [[ -d "${MODEL_DIR}" && "${MODEL_DIR}" != "app/src/main/assets/vosk-model-small-cn/" ]]; then
              mv "${MODEL_DIR}" app/src/main/assets/vosk-model-small-cn
            fi
            echo "vosk-model-small-cn-0.22" > app/src/main/assets/vosk-model-small-cn/uuid
          fi

      - name: Build Release APK
        run: |
          # Create gradlew if not present (gradle wrapper init)
          if [[ ! -f "./gradlew" ]]; then
            gradle wrapper --gradle-version=8.2
          fi
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
